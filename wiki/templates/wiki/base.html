{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Runeterra Archive{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{% static 'wiki/favicon.svg' %}">
    <link rel="stylesheet" href="{% static 'wiki/styles.css' %}">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <div class="brand-block">
                <a class="brand-mark" href="{% url 'wiki:home' %}">
                    <img src="{% static 'wiki/favicon.svg' %}" alt="Runeterra Archive">
                </a>
                <div>
                    <h1><a href="{% url 'wiki:home' %}">Runeterra Archive</a></h1>
                    <p class="eyebrow">Wiki de League of Legends</p>
                </div>
            </div>
            <div class="header-right">
                <nav class="site-nav">
                    <a href="{% url 'wiki:champion_list' %}">Campeones</a>
                    <a href="{% url 'wiki:region_list' %}">Regiones</a>
                    <a href="{% url 'wiki:item_list' %}">Objetos</a>
                    <a href="{% url 'wiki:stats' %}">Estadísticas</a>
                    <a href="/api/champions">API</a>
                </nav>
                <div class="auth-block">
                    {% if user.is_authenticated %}
                        <form method="post" action="{% url 'wiki:logout' %}" class="logout-form">
                            {% csrf_token %}
                            <button type="submit" class="user-pill">
                                <span class="pill-username">{{ user.username }}</span>
                                <span class="pill-logout">Salir</span>
                            </button>
                        </form>
                    {% else %}
                        <a class="ghost-button" href="{% url 'wiki:login' %}">Entrar</a>
                        <a class="solid-button" href="{% url 'wiki:register' %}">Registro</a>
                    {% endif %}
                </div>
            </div>
        </header>

        <main class="site-main">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
